services:
  - type: web
    name: zambia-z-digital
    env: node
    plan: free
    buildCommand: npm run install-all && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromConfig: true # Link to your MongoDB/Prisma URL
      - key: APP_NAME
        value: "Zambia Z Digital"
      - key: PESAPAL_ENVIRONMENT
        value: production
