name: Zambia Z System Sync

on:
  schedule:
    # Runs every 16 minutes to maintain system heartbeat
    - cron: "*/16 * * * *"
  workflow_dispatch: # Allows you to run it manually for testing

permissions:
  contents: write

jobs:
  system-heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Update System Logs
        run: |
          # Use a more professional log file name
          LOG_FILE="zambiaz-sync.log"
          
          echo "Zambia Z Heartbeat: $(date -u +"%Y-%m-%dT%H:%M:%SZ") | System Status: Active" > "$LOG_FILE"
          
          # Configure Git with your professional identity
          git config user.name "Zambia Z System Bot"
          git config user.email "admin@zambiaz.com"
          
          git add "$LOG_FILE"
          
          # Only commit if changes exist to avoid redundant logs
          if ! git diff --cached --quiet; then
            git commit -m "System: Zambia Z Heartbeat Sync [$(date -u +'%Y-%m-%d %H:%M')]"
          fi

      - name: Push Synchronization
        run: git push origin HEAD
